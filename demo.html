<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NERFIFY — Demo</title>
<meta name="description" content="NERFIFY: A Multi-Agent Framework for Turning NeRF Papers into Code — CVPR 2026 Highlight.">
<style>
  :root {
    --bg: #0b0d12;
    --panel: #11141b;
    --fg: #e7ecf3;
    --muted: #8a93a6;
    --accent: #ff6b35;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: radial-gradient(1200px 600px at 50% -10%, #1a1f2b 0%, var(--bg) 60%) fixed;
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  body { display: flex; flex-direction: column; align-items: center; padding: 32px 20px 48px; gap: 20px; }
  header { text-align: center; max-width: 900px; }
  .badge {
    display: inline-block;
    font-size: 12px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #fff;
    background: linear-gradient(90deg, #ef4444, #f97316);
    padding: 6px 12px;
    border-radius: 999px;
    margin-bottom: 14px;
    font-weight: 600;
  }
  h1 {
    font-size: clamp(28px, 4vw, 44px);
    font-weight: 800;
    letter-spacing: -0.02em;
    margin-bottom: 6px;
  }
  h1 .fire { color: var(--accent); }
  .tagline { color: var(--muted); font-size: clamp(14px, 1.6vw, 16px); }
  .video-frame {
    width: min(1200px, 100%);
    aspect-ratio: 16 / 9;
    background: #000;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 30px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.06) inset;
  }
  .video-frame video {
    width: 100%;
    height: 100%;
    display: block;
    object-fit: contain;
    background: #000;
  }
  .links {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    margin-top: 4px;
  }
  .links a {
    color: var(--fg);
    text-decoration: none;
    background: var(--panel);
    border: 1px solid rgba(255,255,255,0.08);
    padding: 10px 16px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 500;
    transition: transform 0.15s ease, border-color 0.15s ease;
  }
  .links a:hover { transform: translateY(-1px); border-color: var(--accent); }
  footer { color: var(--muted); font-size: 13px; text-align: center; margin-top: 12px; }
</style>
</head>
<body>
  <header>
    <div class="badge">🔥 CVPR 2026 Highlight</div>
    <h1><span class="fire">🔥</span> NERFIFY</h1>
    <p class="tagline">A Multi-Agent Framework for Turning NeRF Papers into Code</p>
  </header>

  <div class="video-frame">
    <video autoplay controls muted loop playsinline preload="metadata" src="./nerfify-demo.mp4"></video>
  </div>

  <nav class="links">
    <a href="https://jainsee24.github.io/NERFIFY/" target="_blank" rel="noopener">Project Page</a>
    <a href="https://arxiv.org/abs/2603.00805" target="_blank" rel="noopener">arXiv</a>
    <a href="https://arxiv.org/pdf/2603.00805" target="_blank" rel="noopener">Paper PDF</a>
    <a href="https://github.com/seemandhar/nerfify-code" target="_blank" rel="noopener">Code</a>
  </nav>

  <footer>Seemandhar Jain · Keshav Gupta · Kunal Gupta · Manmohan Chandraker — UC San Diego</footer>
</body>
</html>
